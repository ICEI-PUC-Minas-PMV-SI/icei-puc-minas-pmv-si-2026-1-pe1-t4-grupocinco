<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-nav">🐾 LarCerto</div> <nav>
            <ul>
                <li><a href="#" class="active">🏠 Início</a></li>
                <li><a href="#">👥 Adotantes</a></li>
                <li><a href="#">❤️ Favoritos</a></li>

            </ul>
        </nav>
    </header>
   <div class="logo" style="font-size: 64px; font-weight: bold;">
    🐾 LarCerto </div>
    <!-- Formulário de cadastro e direcionamento para tela de Login-->
    <form action="login.html" method="get">
        <label for="login">Login:</label><br>
        <input type="text" id="login" name="login" required><br><br>

        <label for="password">Senha:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="address">Endereço:</label><br>
        <input type="address" id="address" name="address" required><br><br>

        <label for="phone-number">Celular:</label><br>
        <input type="phone-number" id="phone-number" name="phone-number" required><br><br>

       <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <button type="submit">Registrar</button><br><br>
    </form>
    <!-- Botão que direciona para tela de Login-->
     <form action="login.html" method="get">   
         <button type="submit">Já tenho login. Fazer Login</button>
     </form>
</body>
</html>
