    <!-- Formulário para entrada de credenciais no login e escolha da visão-->
   <form id="meuForm">

    <label for="password">Senha:</label><br>

    <input type="radio" id="adotar" name="acao" value="adotar" required>
    <label for="adotar">Adotar</label>
    <input type="radio" id="doar" name="acao" value="doar" required>
    <label for="doar">Doar</label><br><br>

    <button type="button" onclick="direcionarUsuario()">Entrar</button><br><br>
    <script src="script.js"></script>
   </form>

     <form action="cadastro.html" method="get">
